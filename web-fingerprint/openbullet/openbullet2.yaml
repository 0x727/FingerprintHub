id: openbullet2
info:
  name: openbullet2
  author: cn-kali-team
  tags: detect,tech,openbullet2
  severity: info
  metadata:
    fofa-query:
    - title="openbullet2webclient"
    product: openbullet2
    vendor: openbullet
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>openbullet2webclient.*?</title>
