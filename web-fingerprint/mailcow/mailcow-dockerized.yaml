id: mailcow-dockerized
info:
  name: mailcow-dockerized
  author: cn-kali-team
  tags: detect,tech,mailcow-dockerized
  severity: info
  metadata:
    fofa-query:
    - title="mailcow"
    product: mailcow-dockerized
    shodan-query:
    - http.favicon.hash:2146763496
    vendor: mailcow
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: favicon
    hash:
    - '2146763496'
  - type: regex
    regex:
    - (?mi)<title[^>]*>mailcow.*?</title>
