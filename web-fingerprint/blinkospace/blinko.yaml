id: blinko
info:
  name: blinko
  author: cn-kali-team
  tags: detect,tech,blinko
  severity: info
  metadata:
    fofa-query:
    - title="blinko"
    product: blinko
    shodan-query:
    - http.title:"blinko"
    vendor: blinkospace
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>blinko.*?</title>
