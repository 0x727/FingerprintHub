id: praisonai
info:
  name: praisonai
  author: cn-kali-team
  tags: detect,tech,praisonai
  severity: info
  metadata:
    fofa-query:
    - body="praisonai app"
    product: praisonai
    shodan-query:
    - http.html:"praisonai app"
    vendor: praison
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - praisonai app
    case-insensitive: true
