id: comfyui-manager
info:
  name: comfyui-manager
  author: cn-kali-team
  tags: detect,tech,comfyui-manager
  severity: info
  metadata:
    product: comfyui-manager
    shodan-query:
    - http.title:"comfyui"
    vendor: comfy-org
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>comfyui.*?</title>
