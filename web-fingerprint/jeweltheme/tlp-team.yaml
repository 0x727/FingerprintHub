id: tlp-team
info:
  name: tlp-team
  author: cn-kali-team
  tags: detect,tech,tlp-team
  severity: info
  metadata:
    fofa-query:
    - body="tlp-team" || body="rt-team-container"
    product: tlp-team
    shodan-query:
    - http.html:"tlp-team"
    vendor: jeweltheme
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - rt-team-container
    - tlp-team
