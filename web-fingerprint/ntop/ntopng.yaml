id: ntopng
info:
  name: ntopng
  author: cn-kali-team
  tags: detect,tech,ntopng
  severity: info
  metadata:
    fofa-query:
    - title="ntopng" && port="3000"
    product: ntopng
    shodan-query:
    - http.title:"ntopng" port:3000
    vendor: ntop
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>ntopng" port:3000.*?</title>
    - (?mi)<title[^>]*>ntopng.*?</title>
