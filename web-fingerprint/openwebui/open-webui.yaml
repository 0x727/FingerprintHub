id: open-webui
info:
  name: open-webui
  author: cn-kali-team
  tags: detect,tech,open-webui
  severity: info
  metadata:
    fofa-query:
    - title="open webui"
    product: open-webui
    shodan-query:
    - title:"open webui"
    vendor: openwebui
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>open webui.*?</title>
