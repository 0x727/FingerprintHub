id: triton-inference-server
info:
  name: triton-inference-server
  author: cn-kali-team
  tags: detect,tech,triton-inference-server
  severity: info
  metadata:
    product: triton-inference-server
    shodan-query:
    - http.title:"triton" port:8080
    vendor: nvidia
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>triton" port:8080.*?</title>
