id: mcp-atlassian
info:
  name: mcp-atlassian
  author: cn-kali-team
  tags: detect,tech,mcp-atlassian
  severity: info
  metadata:
    fofa-query:
    - body="atlassian mcp" || header="mcp-session-id"
    product: mcp-atlassian
    shodan-query:
    - http.html:"atlassian mcp"
    vendor: sooperset
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - atlassian mcp
    case-insensitive: true
