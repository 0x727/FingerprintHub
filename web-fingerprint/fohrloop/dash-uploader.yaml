id: dash-uploader
info:
  name: dash-uploader
  author: cn-kali-team
  tags: detect,tech,dash-uploader
  severity: info
  metadata:
    fofa-query:
    - body="_dash-undo-redo"
    product: dash-uploader
    shodan-query:
    - html:"_dash-undo-redo"
    vendor: fohrloop
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - _dash-undo-redo
    case-insensitive: true
