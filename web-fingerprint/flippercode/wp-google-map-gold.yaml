id: wp-google-map-gold
info:
  name: wp-google-map-gold
  author: cn-kali-team
  tags: detect,tech,wp-google-map-gold
  severity: info
  metadata:
    fofa-query:
    - body="/wp-content/plugins/wp-maps-pro/"
    product: wp-google-map-gold
    shodan-query:
    - http.html:"/wp-content/plugins/wp-maps-pro/"
    vendor: flippercode
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - /wp-content/plugins/wp-maps-pro/
