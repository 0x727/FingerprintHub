id: hoppscotch
info:
  name: hoppscotch
  author: cn-kali-team
  tags: detect,tech,hoppscotch
  severity: info
  metadata:
    fofa-query:
    - title="hoppscotch"
    product: hoppscotch
    shodan-query:
    - http.title:"hoppscotch"
    vendor: hoppscotch
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>hoppscotch.*?</title>
