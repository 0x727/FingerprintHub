id: bitrix_site_manager
info:
  name: bitrix_site_manager
  author: cn-kali-team
  tags: detect,tech,bitrix_site_manager
  severity: info
  metadata:
    product: bitrix_site_manager
    shodan-query:
    - html:"/bitrix/"
    vendor: bitrix24
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - /bitrix/
