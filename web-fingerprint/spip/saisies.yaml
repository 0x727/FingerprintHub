id: saisies
info:
  name: saisies
  author: cn-kali-team
  tags: detect,tech,saisies
  severity: info
  metadata:
    fofa-query:
    - app="spip"
    product: saisies
    shodan-query:
    - http.html:"spip"
    vendor: spip
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - spip
