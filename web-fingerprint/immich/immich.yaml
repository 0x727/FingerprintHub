id: immich
info:
  name: immich
  author: Ruashots
  tags: detect,tech,immich
  severity: info
  metadata:
    product: immich
    shodan-query:
    - http.html:"bg-immich-bg"
    vendor: immich
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - immich
    - /_app/immutable
    condition: and
    case-insensitive: true
