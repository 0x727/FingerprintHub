id: milvus
info:
  name: milvus
  author: cn-kali-team
  tags: detect,tech,milvus
  severity: info
  metadata:
    product: milvus
    shodan-query:
    - http.html:"404 page not found" port:"9091"
    vendor: milvus
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - 404 page not found" port:"9091
