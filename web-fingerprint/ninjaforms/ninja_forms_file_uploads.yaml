id: ninja_forms_file_uploads
info:
  name: ninja_forms_file_uploads
  author: cn-kali-team
  tags: detect,tech,ninja_forms_file_uploads
  severity: info
  metadata:
    fofa-query:
    - body="nfpluginsettings.js?ver="
    product: ninja_forms_file_uploads
    shodan-query:
    - http.html:"nfpluginsettings.js?ver="
    vendor: ninjaforms
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - nfpluginsettings.js?ver=
