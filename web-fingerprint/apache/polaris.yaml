id: polaris
info:
  name: polaris
  author: cn-kali-team
  tags: detect,tech,polaris
  severity: info
  metadata:
    fofa-query:
    - title="apache polaris"
    product: polaris
    shodan-query:
    - http.title:"apache polaris"
    vendor: apache
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>apache polaris.*?</title>
