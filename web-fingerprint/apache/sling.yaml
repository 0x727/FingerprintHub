id: sling
info:
  name: sling
  author: cn-kali-team
  tags: detect,tech,sling
  severity: info
  metadata:
    product: sling
    shodan-query:
    - title:"apache sling"
    vendor: apache
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>apache sling.*?</title>
