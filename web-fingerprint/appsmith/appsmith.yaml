id: appsmith
info:
  name: appsmith
  author: cn-kali-team
  tags: detect,tech,appsmith
  severity: info
  metadata:
    fofa-query:
    - title="appsmith"
    product: appsmith
    shodan-query:
    - http.title:"appsmith"
    vendor: appsmith
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>appsmith.*?</title>
