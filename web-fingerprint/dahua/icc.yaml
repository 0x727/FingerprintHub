id: icc
info:
  name: icc
  author: cn-kali-team
  tags: detect,tech,icc
  severity: info
  metadata:
    fofa-query:
    - icon_hash="-1935899595" && body="*客户端会小于800*"
    product: icc
    vendor: dahua
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - '*客户端会小于800*'
  - type: favicon
    hash:
    - '-1935899595'
