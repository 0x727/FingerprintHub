id: site_management
info:
  name: site_management
  author: cn-kali-team
  tags: detect,tech,site_management
  severity: info
  metadata:
    product: site_management
    shodan-query:
    - html:"/bitrix/"
    vendor: bitrix
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - /bitrix/
    case-insensitive: true
