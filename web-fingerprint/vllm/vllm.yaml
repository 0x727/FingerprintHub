id: vllm
info:
  name: vllm
  author: cn-kali-team
  tags: detect,tech,vllm
  severity: info
  metadata:
    product: vllm
    shodan-query:
    - http.html:"/v1/models" http.html:"vllm"
    vendor: vllm
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - /v1/models" http.html:"vllm
