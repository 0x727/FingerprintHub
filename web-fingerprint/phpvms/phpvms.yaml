id: phpvms
info:
  name: phpvms
  author: cn-kali-team
  tags: detect,tech,phpvms
  severity: info
  metadata:
    fofa-query:
    - app="phpvms"
    product: phpvms
    shodan-query:
    - http.html:"phpvms"
    vendor: phpvms
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - phpvms
