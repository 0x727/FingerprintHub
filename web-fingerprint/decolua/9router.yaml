id: 9router
info:
  name: 9router
  author: cn-kali-team
  tags: detect,tech,9router
  severity: info
  metadata:
    fofa-query:
    - port="20128" || title="9router"
    product: 9router
    shodan-query:
    - port:20128 http.html:"9router"
    vendor: decolua
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>9router.*?</title>
