id: guests
info:
  name: guests
  author: cn-kali-team
  tags: detect,tech,guests
  severity: info
  metadata:
    fofa-query:
    - title="owncloud"
    product: guests
    shodan-query:
    - http.title:"owncloud"
    vendor: owncloud
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>owncloud.*?</title>
