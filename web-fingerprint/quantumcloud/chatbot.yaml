id: chatbot
info:
  name: chatbot
  author: cn-kali-team
  tags: detect,tech,chatbot
  severity: info
  metadata:
    fofa-query:
    - body="wp_chatbot_obj"
    product: chatbot
    shodan-query:
    - http.html:"wp_chatbot_obj"
    vendor: quantumcloud
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - wp_chatbot_obj
