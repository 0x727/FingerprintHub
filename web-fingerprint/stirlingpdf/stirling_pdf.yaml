id: stirling_pdf
info:
  name: stirling_pdf
  author: cn-kali-team
  tags: detect,tech,stirling_pdf
  severity: info
  metadata:
    fofa-query:
    - title="stirling pdf"
    product: stirling_pdf
    shodan-query:
    - http.title:"stirling pdf"
    vendor: stirlingpdf
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>stirling pdf.*?</title>
