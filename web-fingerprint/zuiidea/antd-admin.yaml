id: antd-admin
info:
  name: antd-admin
  author: cn-kali-team
  tags: detect,tech,antd-admin
  severity: info
  metadata:
    fofa-query:
    - body="/@@/devscripts.js" && body="//! umi version:" && body="/umi.js"
    product: antd-admin
    shodan-query:
    - html:"/umi.js" html:"@@/devscripts.js"
    vendor: zuiidea
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - '//! umi version:'
    - /@@/devscripts.js
    - /umi.js
    - /umi.js" html:"@@/devscripts.js
