id: wpvivid-backuprestore
info:
  name: wpvivid-backuprestore
  author: cn-kali-team
  tags: detect,tech,wpvivid-backuprestore
  severity: info
  metadata:
    fofa-query:
    - body="wp-content/plugins/wpvivid-backuprestore"
    product: wpvivid-backuprestore
    shodan-query:
    - http.component:"wordpress"
    vendor: wpvivid
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - wp-content/plugins/wpvivid-backuprestore
