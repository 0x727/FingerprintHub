id: nocobase
info:
  name: nocobase
  author: cn-kali-team
  tags: detect,tech,nocobase
  severity: info
  metadata:
    fofa-query:
    - body="__nocobase_public_path__"
    product: nocobase
    shodan-query:
    - http.title:"nocobase"
    vendor: nocobase
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - __nocobase_public_path__
  - type: regex
    regex:
    - (?mi)<title[^>]*>nocobase.*?</title>
