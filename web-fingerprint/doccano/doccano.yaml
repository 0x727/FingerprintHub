id: doccano
info:
  name: doccano
  author: cn-kali-team
  tags: detect,tech,doccano
  severity: info
  metadata:
    fofa-query:
    - title="doccano"
    product: doccano
    shodan-query:
    - http.title:"doccano"
    vendor: doccano
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>doccano.*?</title>
