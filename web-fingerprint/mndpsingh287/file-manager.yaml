id: file-manager
info:
  name: file-manager
  author: cn-kali-team
  tags: detect,tech,file-manager
  severity: info
  metadata:
    fofa-query:
    - body="wp-file-manager"
    product: file-manager
    shodan-query:
    - http.component:"wordpress"
    vendor: mndpsingh287
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - wp-file-manager
