id: grocy
info:
  name: grocy
  author: cn-kali-team
  tags: detect,tech,grocy
  severity: info
  metadata:
    fofa-query:
    - title="grocy" || body="grocy-version"
    product: grocy
    shodan-query:
    - http.title:"grocy"
    vendor: grocy
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - grocy-version
  - type: regex
    regex:
    - (?mi)<title[^>]*>grocy.*?</title>
