id: web_interface
info:
  name: web_interface
  author: cn-kali-team
  tags: detect,tech,web_interface
  severity: info
  metadata:
    product: web_interface
    shodan-query:
    - title:"pi-hole"
    vendor: pi-hole
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>pi-hole.*?</title>
