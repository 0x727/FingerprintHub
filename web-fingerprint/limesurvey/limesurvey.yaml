id: limesurvey
info:
  name: limesurvey
  author: cn-kali-team
  tags: detect,tech,limesurvey
  severity: info
  metadata:
    fofa-query:
    - title="limesurvey"
    product: limesurvey
    shodan-query:
    - http.title:"limesurvey"
    vendor: limesurvey
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>limesurvey.*?</title>
