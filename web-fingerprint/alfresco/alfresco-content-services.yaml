id: alfresco-content-services
info:
  name: alfresco-content-services
  author: cn-kali-team
  tags: detect,tech,alfresco-content-services
  severity: info
  metadata:
    fofa-query:
    - title="alfresco" || body="/share/res/js/alfresco"
    product: alfresco-content-services
    shodan-query:
    - http.title:"alfresco" http.html:"alfresco"
    vendor: alfresco
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - /share/res/js/alfresco
  - type: regex
    regex:
    - (?mi)<title[^>]*>alfresco" http.html:"alfresco.*?</title>
    - (?mi)<title[^>]*>alfresco.*?</title>
