id: windmill
info:
  name: windmill
  author: cn-kali-team
  tags: detect,tech,windmill
  severity: info
  metadata:
    fofa-query:
    - app="windmill"
    product: windmill
    shodan-query:
    - http.html:"windmill" http.html:"svelte-global-loader"
    vendor: windmill
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - windmill" http.html:"svelte-global-loader
    case-insensitive: true
