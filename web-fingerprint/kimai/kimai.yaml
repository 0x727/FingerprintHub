id: kimai
info:
  name: kimai
  author: cn-kali-team
  tags: detect,tech,kimai
  severity: info
  metadata:
    fofa-query:
    - title="kimai"
    product: kimai
    shodan-query:
    - title:"kimai"
    vendor: kimai
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>kimai.*?</title>
