id: frappe
info:
  name: frappe
  author: cn-kali-team
  tags: detect,tech,frappe
  severity: info
  metadata:
    fofa-query:
    - title="login" && body="frappe"
    product: frappe
    shodan-query:
    - http.title:"login" http.html:"frappe"
    vendor: frappe
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - frappe
    case-insensitive: true
  - type: regex
    regex:
    - (?mi)<title[^>]*>login" http.html:"frappe.*?</title>
    - (?mi)<title[^>]*>login.*?</title>
