id: astro
info:
  name: astro
  author: cn-kali-team
  tags: detect,tech,astro
  severity: info
  metadata:
    product: astro
    shodan-query:
    - html:"_astro"
    - http.component:"astro"
    vendor: astro
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - _astro
