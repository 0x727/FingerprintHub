id: code-server
info:
  name: code-server
  author: Ruashots
  tags: detect,tech,code-server
  severity: info
  metadata:
    product: code-server
    shodan-query:
    - http.html:"telemetry.coder.com"
    vendor: coder
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - telemetry.coder.com
    case-insensitive: true
  - type: word
    words:
    - code-server
    - /_static/
    condition: and
    case-insensitive: true
