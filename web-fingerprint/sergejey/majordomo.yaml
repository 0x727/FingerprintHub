id: majordomo
info:
  name: majordomo
  author: cn-kali-team
  tags: detect,tech,majordomo
  severity: info
  metadata:
    fofa-query:
    - body="templates/application.html"
    product: majordomo
    shodan-query:
    - http.html:"templates/application.html"
    vendor: sergejey
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - templates/application.html
