id: heimdall
info:
  name: heimdall
  author: cn-kali-team
  tags: detect,tech,heimdall
  severity: info
  metadata:
    fofa-query:
    - app="heimdall-application-dashboard"
    product: heimdall
    shodan-query:
    - title:"heimdall"
    vendor: linuxserver
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>heimdall.*?</title>
