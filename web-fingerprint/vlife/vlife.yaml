id: vlife
info:
  name: vlife
  author: cn-kali-team
  tags: detect,tech,vlife
  severity: info
  metadata:
    fofa-query:
    - http.title:"vlife"
    product: vlife
    shodan-query:
    - http.title:"vlife"
    vendor: vlife
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - http.title:"vlife
    case-insensitive: true
  - type: regex
    regex:
    - (?mi)<title[^>]*>vlife.*?</title>
