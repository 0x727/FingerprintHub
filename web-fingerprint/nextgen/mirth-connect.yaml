id: mirth-connect
info:
  name: mirth-connect
  author: cn-kali-team
  tags: detect,tech,mirth-connect
  severity: info
  metadata:
    fofa-query:
    - title="mirth connect"
    product: mirth-connect
    shodan-query:
    - http.title:"mirth connect"
    vendor: nextgen
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>mirth connect.*?</title>
