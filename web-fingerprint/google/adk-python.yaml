id: adk-python
info:
  name: adk-python
  author: cn-kali-team
  tags: detect,tech,adk-python
  severity: info
  metadata:
    fofa-query:
    - body="adk" && header="uvicorn"
    product: adk-python
    shodan-query:
    - title:"adk" http.component:"uvicorn"
    vendor: google
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - adk
  - type: regex
    regex:
    - (?mi)<title[^>]*>adk" http.component:"uvicorn.*?</title>
