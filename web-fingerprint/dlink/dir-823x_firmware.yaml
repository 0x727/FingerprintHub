id: dir-823x_firmware
info:
  name: dir-823x_firmware
  author: cn-kali-team
  tags: detect,tech,dir-823x_firmware
  severity: info
  metadata:
    fofa-query:
    - title="dir-823x"
    product: dir-823x_firmware
    shodan-query:
    - title:"d-link"
    vendor: dlink
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>d-link.*?</title>
    - (?mi)<title[^>]*>dir-823x.*?</title>
