id: flaresolverr
info:
  name: flaresolverr
  author: Ruashots
  tags: detect,tech,flaresolverr
  severity: info
  metadata:
    product: flaresolverr
    shodan-query:
    - http.html:"FlareSolverr is ready"
    vendor: flaresolverr
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - flaresolverr is ready
    case-insensitive: true
