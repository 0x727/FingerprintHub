id: nginx-ui
info:
  name: nginx-ui
  author: cn-kali-team
  tags: detect,tech,nginx-ui
  severity: info
  metadata:
    fofa-query:
    - title="nginx ui"
    product: nginx-ui
    shodan-query:
    - http.title:"nginx ui"
    vendor: 0xjacky
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>nginx ui.*?</title>
