id: esm.sh
info:
  name: esm.sh
  author: cn-kali-team
  tags: detect,tech,esm.sh
  severity: info
  metadata:
    product: esm.sh
    shodan-query:
    - http.html:"esm.sh"
    vendor: esm-dev
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - esm.sh
