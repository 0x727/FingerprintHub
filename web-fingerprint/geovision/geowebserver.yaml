id: geowebserver
info:
  name: geowebserver
  author: cn-kali-team
  tags: detect,tech,geowebserver
  severity: info
  metadata:
    product: geowebserver
    shodan-query:
    - title:"geowebserver"
    vendor: geovision
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>geowebserver.*?</title>
