id: redmine
info:
  name: redmine
  author: cn-kali-team
  tags: detect,tech,redmine
  severity: info
  metadata:
    fofa-query:
    - title="redmine"
    product: redmine
    shodan-query:
    - http.title:"redmine"
    vendor: redmine
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>redmine.*?</title>
