id: dockwatch
info:
  name: dockwatch
  author: cn-kali-team
  tags: detect,tech,dockwatch
  severity: info
  metadata:
    product: dockwatch
    shodan-query:
    - title:"dockwatch"
    vendor: notifiarr
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>dockwatch.*?</title>
