id: dbgate
info:
  name: dbgate
  author: cn-kali-team
  tags: detect,tech,dbgate
  severity: info
  metadata:
    fofa-query:
    - title="dbgate"
    product: dbgate
    shodan-query:
    - http.title:"dbgate"
    vendor: dbgate
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>dbgate.*?</title>
