id: mlflow
info:
  name: mlflow
  author: cn-kali-team
  tags: detect,tech,mlflow
  severity: info
  metadata:
    fofa-query:
    - title="mlflow"
    product: mlflow
    shodan-query:
    - title:"mlflow"
    vendor: mlflow
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>mlflow.*?</title>
  - type: word
    words:
    - <title>mlflow</title>
    case-insensitive: true
