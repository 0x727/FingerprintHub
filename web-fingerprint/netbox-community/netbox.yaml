id: netbox
info:
  name: netbox
  author: cn-kali-team
  tags: detect,tech,netbox
  severity: info
  metadata:
    fofa-query:
    - title="netbox" || body="netbox-community"
    product: netbox
    shodan-query:
    - http.title:"netbox"
    vendor: netbox-community
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: word
    words:
    - netbox-community
  - type: regex
    regex:
    - (?mi)<title[^>]*>netbox.*?</title>
