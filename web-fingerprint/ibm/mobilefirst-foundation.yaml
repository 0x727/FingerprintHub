id: mobilefirst-foundation
info:
  name: mobilefirst-foundation
  author: cn-kali-team
  tags: detect,tech,mobilefirst-foundation
  severity: info
  metadata:
    fofa-query:
    - title="mobilefirst operations console"
    product: mobilefirst-foundation
    shodan-query:
    - http.title:"mobilefirst operations console"
    vendor: ibm
    verified: true
http:
- method: GET
  path:
  - '{{BaseURL}}/'
  matchers:
  - type: regex
    regex:
    - (?mi)<title[^>]*>mobilefirst operations console.*?</title>
